<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Spoilage Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2d3148;
      --fresh:    #22c55e;
      --spoiled:  #ef4444;
      --accent:   #6366f1;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -.02em;
    }
    header p {
      color: var(--muted);
      margin-top: .4rem;
      font-size: .95rem;
    }
    .pill {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .15rem .6rem;
      border-radius: 999px;
      margin-bottom: .8rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
      margin-bottom: 1.5rem;
    }

    /* ── Drop zone ──────────────────────────────────────────────────────── */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    #drop-zone.drag-over { border-color: var(--accent); background: rgba(99,102,241,.07); }
    #drop-zone svg { width: 48px; height: 48px; stroke: var(--muted); margin-bottom: .8rem; }
    #drop-zone p  { color: var(--muted); font-size: .9rem; }
    #drop-zone strong { color: var(--accent); }
    #file-input { display: none; }

    #preview-wrap { margin-top: 1rem; display: none; }
    #preview-img  { width: 100%; border-radius: 8px; object-fit: cover; max-height: 260px; }

    /* ── Button ─────────────────────────────────────────────────────────── */
    #analyse-btn {
      margin-top: 1.2rem;
      width: 100%;
      padding: .85rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    #analyse-btn:hover   { opacity: .88; }
    #analyse-btn:active  { transform: scale(.98); }
    #analyse-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Spinner ─────────────────────────────────────────────────────────── */
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: .5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result card ─────────────────────────────────────────────────────── */
    #result-card { display: none; }
    #result-label {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: .4rem;
      letter-spacing: -.03em;
    }
    #result-label.fresh   { color: var(--fresh); }
    #result-label.spoiled { color: var(--spoiled); }
    #result-conf { text-align: center; color: var(--muted); font-size: .9rem; margin-bottom: 1.4rem; }

    /* ── Bars ────────────────────────────────────────────────────────────── */
    .bar-row { margin-bottom: .8rem; }
    .bar-label {
      display: flex; justify-content: space-between;
      font-size: .85rem; margin-bottom: .3rem;
      text-transform: capitalize;
    }
    .bar-track {
      height: 10px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 99px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }
    .bar-fill.fresh   { background: var(--fresh); }
    .bar-fill.spoiled { background: var(--spoiled); }

    #infer-time { color: var(--muted); font-size: .78rem; text-align: right; margin-top: .8rem; }

    /* ── Error ───────────────────────────────────────────────────────────── */
    #error-box {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.35);
      border-radius: 8px;
      padding: .8rem 1rem;
      color: #fca5a5;
      font-size: .88rem;
      display: none;
      margin-top: 1rem;
    }

    footer {
      color: var(--muted); font-size: .78rem; margin-top: auto; padding-top: 2rem;
    }
  </style>
</head>
<body>

<header>
  <span class="pill">Deep Learning · CNN</span>
  <h1>Food Spoilage Detector</h1>
  <p>Upload a food photo and the model will assess its freshness instantly.</p>
</header>

<!-- Upload card -->
<div class="card">
  <div id="drop-zone" role="button" tabindex="0" aria-label="Upload food image">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.3">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3 16.5V19a2 2 0 002 2h14a2 2 0 002-2v-2.5M16 9l-4-4-4 4M12 5v11"/>
    </svg>
    <p>Drop an image here or <strong>click to browse</strong></p>
    <p style="margin-top:.3rem;font-size:.78rem;">JPG · PNG · WEBP — max 16 MB</p>
  </div>
  <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.webp" />

  <div id="preview-wrap">
    <img id="preview-img" alt="Preview" />
  </div>

  <button id="analyse-btn" disabled>Analyse</button>
  <div id="error-box"></div>
</div>

<!-- Result card -->
<div class="card" id="result-card">
  <div id="result-label">—</div>
  <div id="result-conf">—</div>
  <div id="bars"></div>
  <div id="infer-time"></div>
</div>

<footer>Food Spoilage Detection · CNN with MobileNetV2 Transfer Learning</footer>

<script>
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const previewWrap = document.getElementById('preview-wrap');
  const previewImg = document.getElementById('preview-img');
  const analyseBtn = document.getElementById('analyse-btn');
  const errorBox   = document.getElementById('error-box');
  const resultCard = document.getElementById('result-card');
  const resultLabel = document.getElementById('result-label');
  const resultConf  = document.getElementById('result-conf');
  const barsDiv     = document.getElementById('bars');
  const inferTime   = document.getElementById('infer-time');

  let selectedFile = null;

  // ── Drag & drop ────────────────────────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('keydown', e => e.key === 'Enter' && fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    selectedFile = file;
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    previewWrap.style.display = 'block';
    analyseBtn.disabled = false;
    hideError();
    resultCard.style.display = 'none';
  }

  // ── Analyse ────────────────────────────────────────────────────────────────
  analyseBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    analyseBtn.disabled = true;
    analyseBtn.innerHTML = '<span class="spinner"></span>Analysing…';
    hideError();
    resultCard.style.display = 'none';

    const fd = new FormData();
    fd.append('file', selectedFile);

    try {
      const res  = await fetch('/predict', { method: 'POST', body: fd });
      const data = await res.json();

      if (!res.ok || data.error) throw new Error(data.error || 'Server error');

      showResult(data);
    } catch (err) {
      showError(err.message);
    } finally {
      analyseBtn.disabled = false;
      analyseBtn.textContent = 'Analyse Again';
    }
  });

  function showResult(data) {
    const cls = data.prediction;

    resultLabel.textContent = cls.charAt(0).toUpperCase() + cls.slice(1);
    resultLabel.className   = cls;   // 'fresh' or 'spoiled'
    resultConf.textContent  = `Confidence: ${data.confidence}%`;

    barsDiv.innerHTML = '';
    for (const [name, pct] of Object.entries(data.class_probs)) {
      barsDiv.innerHTML += `
        <div class="bar-row">
          <div class="bar-label">
            <span>${name}</span><span>${pct}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill ${name}" style="width:${pct}%"></div>
          </div>
        </div>`;
    }

    inferTime.textContent = `Inference time: ${data.inference_ms} ms`;
    resultCard.style.display = 'block';
  }

  function showError(msg) {
    errorBox.textContent = `Error: ${msg}`;
    errorBox.style.display = 'block';
  }
  function hideError() { errorBox.style.display = 'none'; }
</script>
</body>
</html>
